<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>मंगल टाइपिंग ट्रेनर — InScript</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0d0c14; --ink2:#161422; --ink3:#1f1d2e; --ink4:#2a2840; --ink5:#363454;
  --saffron:#ff9933; --gold:#f5c842; --lotus:#e8547a; --teal:#2dd4bf;
  --ok:#22c55e; --err:#ef4444; --txt:#f8f6ff; --muted:#8b87b0; --dim:#4a4770; --border:#252340;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Syne',sans-serif;background:var(--ink);color:var(--txt);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 10% 0%,rgba(255,153,51,.07) 0%,transparent 60%),
    radial-gradient(ellipse 60% 60% at 90% 100%,rgba(45,212,191,.05) 0%,transparent 60%);}
.app{position:relative;z-index:1;display:grid;grid-template-columns:270px 1fr;min-height:100vh;}

/* SIDEBAR */
.sidebar{background:var(--ink2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0;overflow-y:auto;position:sticky;top:0;height:100vh;}
.sidebar-head{padding:22px 18px 16px;border-bottom:1px solid var(--border);}
.logo{font-size:1.3rem;font-weight:800;letter-spacing:-.5px;background:linear-gradient(120deg,var(--saffron),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.logo-sub{font-size:.68rem;color:var(--muted);margin-top:3px;font-weight:400;letter-spacing:.5px;}
.section-label{font-size:.62rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;padding:14px 18px 6px;}
.row-btns{padding:0 10px 8px;display:flex;flex-direction:column;gap:3px;}
.row-btn{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:9px;border:1.5px solid transparent;background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .18s;text-align:left;width:100%;}
.row-btn .ricon{font-size:.9rem;width:20px;text-align:center;}
.row-btn .rbadge{margin-left:auto;font-size:.6rem;background:var(--ink4);color:var(--dim);padding:1px 6px;border-radius:8px;}
.row-btn:hover{background:var(--ink3);color:var(--txt);border-color:var(--ink5);}
.row-btn.active{background:linear-gradient(135deg,rgba(255,153,51,.12),rgba(245,200,66,.08));border-color:rgba(255,153,51,.4);color:var(--saffron);}
.row-btn.active .rbadge{background:rgba(255,153,51,.2);color:var(--saffron);}
.row-btn .rchars{font-family:'Noto Sans Devanagari',sans-serif;font-size:.65rem;color:var(--dim);display:block;margin-top:1px;line-height:1.2;}
.sidebar-stats{padding:12px 18px;border-top:1px solid var(--border);margin-top:auto;}
.sstat{display:flex;justify-content:space-between;align-items:center;padding:5px 0;}
.sstat-label{font-size:.7rem;color:var(--muted);}
.sstat-val{font-size:1rem;font-weight:800;}
.reset-btn{width:100%;margin-top:8px;padding:8px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .18s;}
.reset-btn:hover{border-color:var(--lotus);color:var(--lotus);}

/* MAIN */
.main{display:flex;flex-direction:column;padding:20px;gap:14px;overflow-y:auto;}
.topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.shift-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:.74rem;font-weight:700;background:var(--ink3);border:1px solid var(--border);color:var(--muted);transition:all .25s;}
.shift-pill.on{background:rgba(45,212,191,.12);border-color:rgba(45,212,191,.5);color:var(--teal);}
.spill-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:all .25s;}
.shift-pill.on .spill-dot{background:var(--teal);box-shadow:0 0 6px var(--teal);}
.shift-ban{flex:1;padding:6px 12px;border-radius:9px;font-size:.76rem;font-weight:700;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);color:var(--err);display:none;animation:slideIn .2s;}
.shift-ban.show{display:block;}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px);}to{opacity:1;transform:translateX(0);}}

/* POOL */
.pool-card{background:var(--ink2);border:1px solid var(--border);border-radius:14px;padding:14px;}
.pool-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.pool-title{font-size:.7rem;font-weight:700;color:var(--saffron);text-transform:uppercase;letter-spacing:1.2px;}
.pool-filters{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;}
.filter-btn{font-size:.65rem;padding:2px 9px;border-radius:7px;border:1px solid var(--border);background:var(--ink3);color:var(--muted);cursor:pointer;transition:all .18s;font-family:'Syne',sans-serif;font-weight:600;}
.filter-btn:hover,.filter-btn.active{border-color:var(--teal);color:var(--teal);}
.pool-count{font-size:.66rem;color:var(--muted);}
.chips{display:flex;flex-wrap:wrap;gap:5px;max-height:130px;overflow-y:auto;}
.chips::-webkit-scrollbar{width:3px;}
.chips::-webkit-scrollbar-thumb{background:var(--ink5);border-radius:2px;}
.chip{font-family:'Noto Sans Devanagari',sans-serif;font-size:.9rem;padding:3px 11px;border-radius:14px;border:1.5px solid var(--border);background:var(--ink3);color:var(--muted);cursor:pointer;transition:all .16s;user-select:none;white-space:nowrap;}
.chip:hover{border-color:var(--teal);color:var(--txt);}
.chip.sel{border-color:var(--teal);color:var(--txt);background:rgba(45,212,191,.08);}

/* PROGRESS */
.pbar-wrap{height:3px;background:var(--ink4);border-radius:3px;overflow:hidden;}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--saffron));border-radius:3px;transition:width .4s;}

/* ARENA */
.arena{background:var(--ink2);border:1.5px solid var(--border);border-radius:18px;padding:28px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:195px;text-align:center;position:relative;transition:border-color .2s,box-shadow .2s;}
.arena.err-mode{border-color:rgba(239,68,68,.5);box-shadow:0 0 28px rgba(239,68,68,.07);}
.arena.ok-mode{border-color:rgba(34,197,94,.4);box-shadow:0 0 28px rgba(34,197,94,.06);}
.a-empty{color:var(--muted);font-size:.95rem;}
.a-meaning{font-size:.8rem;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px;justify-content:center;flex-wrap:wrap;}
.a-tag{background:rgba(255,153,51,.1);border:1px solid rgba(255,153,51,.25);color:var(--saffron);font-size:.66rem;padding:2px 7px;border-radius:7px;font-weight:700;}
.a-word{font-family:'Noto Sans Devanagari',sans-serif;font-size:3.2rem;font-weight:700;letter-spacing:8px;margin-bottom:10px;display:flex;gap:0;justify-content:center;flex-wrap:wrap;min-height:62px;align-items:center;line-height:1.25;}
.ch{display:inline-block;transition:all .1s;border-bottom:3px solid transparent;padding-bottom:1px;}
.ch.pend{color:var(--dim);}
.ch.ok{color:var(--ok);border-bottom-color:rgba(34,197,94,.6);}
.ch.bad{color:var(--err);border-bottom-color:rgba(239,68,68,.6);animation:shk .2s;}
.ch.cur{color:var(--txt);border-bottom-color:var(--saffron);animation:blink 1.1s infinite;}
@keyframes blink{0%,100%{border-bottom-color:var(--saffron);}50%{border-bottom-color:transparent;}}
@keyframes shk{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
.a-roman{color:var(--teal);font-size:.78rem;font-style:italic;opacity:.8;letter-spacing:.5px;}
.a-typed{margin-top:6px;font-size:.7rem;color:var(--muted);}
.a-badge{position:absolute;top:12px;right:14px;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;display:none;}
.a-badge.ok{background:rgba(34,197,94,.15);color:var(--ok);display:block;}
.a-badge.err{background:rgba(239,68,68,.15);color:var(--err);display:block;}
.a-bsp{position:absolute;bottom:12px;right:14px;font-size:.68rem;color:var(--muted);background:var(--ink3);border:1px solid var(--border);border-radius:6px;padding:2px 8px;display:none;}
.a-bsp.show{display:block;}
.skip-btn{position:absolute;bottom:12px;left:14px;font-size:.68rem;padding:3px 10px;border-radius:7px;border:1px solid var(--border);background:var(--ink3);color:var(--muted);cursor:pointer;transition:all .16s;font-family:'Syne',sans-serif;font-weight:600;display:none;}
.skip-btn:hover{border-color:var(--saffron);color:var(--saffron);}
.skip-btn.show{display:block;}

/* KEYBOARD */
.kb-card{background:var(--ink2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;}
.kb-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.kb-title{font-size:.7rem;font-weight:700;color:var(--saffron);text-transform:uppercase;letter-spacing:1.2px;}
.kb-mode{font-size:.7rem;color:var(--muted);margin-left:auto;transition:color .2s;}
.kb-mode.shift-on{color:var(--teal);font-weight:700;}
.krows{display:flex;flex-direction:column;gap:4px;}
.krow{display:flex;justify-content:center;gap:3px;flex-wrap:wrap;}
.key{font-family:'Noto Sans Devanagari',sans-serif;border-radius:7px;min-width:46px;height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:default;transition:all .15s;border:1px solid var(--ink5);background:var(--ink3);}
.key.home-row{border-color:rgba(255,153,51,.45);background:rgba(255,153,51,.04);}
.key.top-row{border-color:rgba(45,212,191,.3);background:rgba(45,212,191,.03);}
.key.bot-row{border-color:rgba(232,84,122,.3);background:rgba(232,84,122,.03);}
.key .ksh{font-size:.68rem;color:var(--dim);line-height:1;min-height:13px;transition:all .25s;}
.key .knm{font-size:.84rem;color:var(--txt);line-height:1;transition:all .25s;}
.key .klt{font-family:'Syne',sans-serif;font-size:.5rem;color:var(--dim);margin-top:2px;}
.kb-shift .key .ksh{color:var(--txt);font-size:.84rem;}
.kb-shift .key .knm{color:var(--dim);font-size:.68rem;}
.key.flash-ok{background:rgba(34,197,94,.2)!important;border-color:var(--ok)!important;}
.key.flash-ok .ksh,.key.flash-ok .knm,.key.flash-ok .klt{color:var(--ok)!important;}
.key.flash-err{background:rgba(239,68,68,.2)!important;border-color:var(--err)!important;animation:shk .2s;}
.key.flash-err .ksh,.key.flash-err .knm,.key.flash-err .klt{color:var(--err)!important;}
.key.space{min-width:100px;}
.key.wide{min-width:62px;}

/* HIGHLIGHT active row on keyboard */
.kb-show-home .key:not(.home-row){opacity:.35;}
.kb-show-top .key:not(.top-row){opacity:.35;}
.kb-show-bot .key:not(.bot-row){opacity:.35;}

.pop{animation:pop .3s ease;}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.05);}100%{transform:scale(1);}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--ink5);border-radius:2px;}
@media(max-width:860px){.app{grid-template-columns:1fr;}.sidebar{position:relative;height:auto;}.a-word{font-size:2rem;letter-spacing:4px;}.main{padding:12px;}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="sidebar-head">
    <div class="logo">मंगल ट्रेनर</div>
    <div class="logo-sub">InScript · Unicode · Devanagari</div>
  </div>
  <div class="section-label">पंक्ति चुनें</div>
  <div class="row-btns" id="rowBtns">
    <button class="row-btn active" data-row="home">
      <span class="ricon">🏠</span>
      <span><span style="display:block">Home Row</span><span class="rchars">ो े ् ि ु | प र क त च ट</span><span class="rchars">ओ ए अ इ उ | फ ड़ ख थ छ ठ</span></span>
      <span class="rbadge" id="badge-home">0</span>
    </button>
    <button class="row-btn" data-row="top">
      <span class="ricon">⬆</span>
      <span><span style="display:block">Top Row</span><span class="rchars">ौ ै ा ी ू | ब ह ग द ज ड</span><span class="rchars">औ ऐ आ ई ऊ | भ ङ घ ध झ ढ</span></span>
      <span class="rbadge" id="badge-top">0</span>
    </button>
    <button class="row-btn" data-row="bottom">
      <span class="ricon">⬇</span>
      <span><span style="display:block">Bottom Row</span><span class="rchars">ं ः म न व ल स ष य</span><span class="rchars">ँ ण ञ ऋ ळ श</span></span>
      <span class="rbadge" id="badge-bottom">0</span>
    </button>
    <button class="row-btn" data-row="home_top">
      <span class="ricon">⬆🏠</span>
      <span style="display:block">Home + Top</span>
      <span class="rbadge" id="badge-home_top">0</span>
    </button>
    <button class="row-btn" data-row="home_bottom">
      <span class="ricon">🏠⬇</span>
      <span style="display:block">Home + Bottom</span>
      <span class="rbadge" id="badge-home_bottom">0</span>
    </button>
    <button class="row-btn" data-row="all">
      <span class="ricon">★</span>
      <span style="display:block">सभी शब्द</span>
      <span class="rbadge" id="badge-all">0</span>
    </button>
  </div>
  <div class="sidebar-stats">
    <div class="section-label" style="padding:0 0 6px;">आँकड़े</div>
    <div class="sstat"><span class="sstat-label">सही अक्षर</span><span class="sstat-val" style="color:var(--ok)" id="sc">0</span></div>
    <div class="sstat"><span class="sstat-label">गलतियाँ</span><span class="sstat-val" style="color:var(--err)" id="ec">0</span></div>
    <div class="sstat"><span class="sstat-label">शब्द पूरे</span><span class="sstat-val" style="color:var(--saffron)" id="wd">0</span></div>
    <div class="sstat"><span class="sstat-label">सटीकता</span><span class="sstat-val" style="color:var(--teal)" id="accv">—</span></div>
    <button class="reset-btn" onclick="resetStats()">↺ Reset</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="shift-pill" id="shiftPill"><span class="spill-dot"></span> Shift: OFF</div>
    <div class="shift-ban" id="shiftBan">⚠ यहाँ Shift की जरूरत नहीं — बिना Shift के दबाएं!</div>
  </div>

  <div class="pool-card">
    <div class="pool-head">
      <span class="pool-title">✦ शब्द चुनें</span>
      <div class="pool-filters" id="poolFilters"></div>
      <span class="pool-count" id="poolCount">0 / 0</span>
    </div>
    <div class="chips" id="chipBox"></div>
  </div>

  <div class="pbar-wrap"><div class="pbar-fill" id="pbarFill" style="width:0%"></div></div>

  <div class="arena" id="arena">
    <div class="a-empty" id="aEmpty">ऊपर से शब्द चुनें और टाइप करना शुरू करें ↑</div>
    <div id="aContent" style="display:none;width:100%;">
      <div class="a-meaning" id="aMeaning"></div>
      <div class="a-word" id="aWord"></div>
      <div class="a-roman" id="aRoman"></div>
      <div class="a-typed" id="aTyped"></div>
    </div>
    <div class="a-badge" id="aBadge"></div>
    <div class="a-bsp" id="aBsp">⌫ Backspace से मिटाएं</div>
    <button class="skip-btn" id="skipBtn" onclick="nextWord()">Skip →</button>
  </div>

  <div class="kb-card">
    <div class="kb-head">
      <span class="kb-title">⌨ InScript Keyboard</span>
      <span class="kb-mode" id="kbMode">Normal Mode</span>
    </div>
    <div class="krows" id="kbDiv"></div>
  </div>
</main>
</div>

<script>
// ══════════════════════════════════════════════════════
// COMPLETE INSCRIPT MAP  key→[normal,shift]
// ══════════════════════════════════════════════════════
const INS = {
  '`':['़','ऒ'],
  '1':['१','!'],'2':['२','"'],'3':['३','#'],'4':['४','$'],'5':['५','%'],
  '6':['६','^'],'7':['७','&'],'8':['८','*'],'9':['९','('],'0':['०',')'],
  '-':['ः','ऑ'],'=':['+','ॐ'],
  // TOP ROW
  'q':['ौ','औ'],'w':['ै','ऐ'],'e':['ा','आ'],'r':['ी','ई'],'t':['ू','ऊ'],
  'y':['ब','भ'],'u':['ह','ङ'],'i':['ग','घ'],'o':['द','ध'],'p':['ज','झ'],
  '[':['ड','ढ'],']':['़','ञ'],
  // HOME ROW
  'a':['ो','ओ'],'s':['े','ए'],'d':['्','अ'],'f':['ि','इ'],'g':['ु','उ'],
  'h':['प','फ'],'j':['र','ड़'],'k':['क','ख'],'l':['त','थ'],';':['च','छ'],"'":['\u091f','\u0920'],
  // BOTTOM ROW
  'z':['ं','ँ'],'x':['ः','ण'],'c':['म','ण'],'v':['न','ञ'],'b':['व','ऋ'],
  'n':['ल','ळ'],'m':['स','श'],',':['ष','।'],'.':['।','.'],'/':['य','य़'],
};

// Row classification for keyboard display
const KEY_ROW = {
  'q':'top','w':'top','e':'top','r':'top','t':'top','y':'top','u':'top','i':'top','o':'top','p':'top','[':'top',']':'top',
  'a':'home','s':'home','d':'home','f':'home','g':'home','h':'home','j':'home','k':'home','l':'home',';':'home',"'":'home',
  'z':'bot','x':'bot','c':'bot','v':'bot','b':'bot','n':'bot','m':'bot',',':'bot','.':'bot','/':'bot',
};

const KB_ROWS = [
  ['q','w','e','r','t','y','u','i','o','p','[',']'],
  ['a','s','d','f','g','h','j','k','l',';',"'"],
  ['z','x','c','v','b','n','m',',','.','/'],
];

// ══════════════════════════════════════════════════════
// CHARACTER SETS PER ROW (strictly validated)
// ══════════════════════════════════════════════════════
const ROW_CHARS = {
  home: new Set(['ो','े','्','ि','ु','प','र','क','त','च','ट','ओ','ए','अ','इ','उ','फ','ड़','ख','थ','छ','ठ']),
  top:  new Set(['ौ','ै','ा','ी','ू','ब','ह','ग','द','ज','ड','औ','ऐ','आ','ई','ऊ','भ','ङ','घ','ध','झ','ढ','ञ']),
  bot:  new Set(['ं','ः','म','न','व','ल','स','ष','।','य','ँ','ण','ञ','ऋ','ळ','श']),
};

function usesOnlyRows(word, allowedRows) {
  const allowed = new Set();
  allowedRows.forEach(r => ROW_CHARS[r].forEach(c => allowed.add(c)));
  return [...word].every(c => allowed.has(c));
}

// ══════════════════════════════════════════════════════
// WORD DATABASE — strictly row-validated
// w=hindi, r=roman, m=meaning, type=matra-category
// ══════════════════════════════════════════════════════
const RAW_WORDS = [
  // ── HOME ROW ──────────────────────────────────────
  // No matra (pure consonants + halant)
  {w:'कर',r:'kar',m:'करना',row:'home',type:'plain'},
  {w:'तर',r:'tar',m:'गीला',row:'home',type:'plain'},
  {w:'पर',r:'par',m:'पर/लेकिन',row:'home',type:'plain'},
  {w:'रक',r:'rak',m:'रोकना',row:'home',type:'plain'},
  {w:'तक',r:'tak',m:'तक (until)',row:'home',type:'plain'},
  {w:'पक',r:'pak',m:'पकना',row:'home',type:'plain'},
  {w:'चर',r:'char',m:'चरना',row:'home',type:'plain'},
  {w:'रच',r:'rach',m:'रचना',row:'home',type:'plain'},
  {w:'चक',r:'chak',m:'चक्र base',row:'home',type:'plain'},
  {w:'कट',r:'kat',m:'काटना base',row:'home',type:'plain'},
  {w:'पट',r:'pat',m:'पट',row:'home',type:'plain'},
  {w:'तट',r:'tat',m:'तट (coast)',row:'home',type:'plain'},
  {w:'चट',r:'chat',m:'चटना',row:'home',type:'plain'},
  {w:'रट',r:'rat',m:'रटना',row:'home',type:'plain'},
  {w:'टक',r:'tak',m:'टकराना',row:'home',type:'plain'},
  {w:'खर',r:'khar',m:'खरा (pure)',row:'home',type:'plain'},

// BUILD ROW GROUPS (strict char validation for home/top/bot)
// ══════════════════════════════════════════════════════
function strictOk(word, rowSet) {
  return [...word].every(c => rowSet.has(c));
}

const GROUPS = {
  home:       RAW_WORDS.filter(w=>w.row==='home' && strictOk(w.w, ROW_CHARS.home)),
  top:        RAW_WORDS.filter(w=>w.row==='top'  && strictOk(w.w, ROW_CHARS.top)),
  bottom:     RAW_WORDS.filter(w=>w.row==='bot'  && strictOk(w.w, ROW_CHARS.bot)),
  home_top:   RAW_WORDS.filter(w=>w.row==='home_top'),
  home_bottom:RAW_WORDS.filter(w=>w.row==='home_bot'),
  all:        [],
};
// Dedupe all
const seen=new Set();
RAW_WORDS.forEach(w=>{if(!seen.has(w.w)){seen.add(w.w);GROUPS.all.push(w);}});

// Type labels for filter buttons per group

  'plain':'व्यंजन','halant':'हलंत (्)','i-matra':'ि मात्रा','u-matra':'ु मात्रा',

};

// Update badges
['home','top','bottom','home_top','home_bottom','all'].forEach(k=>{

  window.addEventListener('blur',()=>{if(shiftDown){shiftDown=false;setShiftUI(false);}});
  document.addEventListener('visibilitychange',()=>{if(document.hidden&&shiftDown){shiftDown=false;setShiftUI(false);}});
  document.getElementById('rowBtns').addEventListener('click',onRowClick);
}

// ══════════════════════════════════════════════════════
// ROW SWITCH
// ══════════════════════════════════════════════════════
function onRowClick(e){
  const btn=e.target.closest('.row-btn'); if(!btn)return;
  document.querySelectorAll('.row-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  curRow=btn.dataset.row; selW=[]; activeFilter='all';
  renderFilters(); renderGrid(); startPrac();
  // highlight keyboard row
  const kd=document.getElementById('kbDiv');
  kd.className='';
  if(curRow==='home')kd.classList.add('kb-show-home');
  else if(curRow==='top')kd.classList.add('kb-show-top');
  else if(curRow==='bottom')kd.classList.add('kb-show-bot');
}

// ══════════════════════════════════════════════════════
// FILTER BUTTONS (by matra type)
// ══════════════════════════════════════════════════════
function renderFilters(){
  const box=document.getElementById('poolFilters');
  box.innerHTML='';
  const words=GROUPS[curRow]||[];
  const types=['all',...new Set(words.map(w=>w.type))];
  types.forEach(t=>{
    const b=document.createElement('button');
    b.className='filter-btn'+(t===activeFilter?' active':'');
    b.textContent= t==='all'? 'सभी प्रकार' : (TYPE_LABELS[t]||t);
    b.onclick=()=>{activeFilter=t; selW=[]; renderFilters(); renderGrid(); startPrac();};
    box.appendChild(b);
  });
}

// ══════════════════════════════════════════════════════
// WORD GRID
// ══════════════════════════════════════════════════════
function getFilteredWords(){
  const words=GROUPS[curRow]||[];
  return activeFilter==='all' ? words : words.filter(w=>w.type===activeFilter);
}
function renderGrid(){
  const box=document.getElementById('chipBox');
  const words=getFilteredWords();
  box.innerHTML='';
  // Select all chip
  const allChip=document.createElement('span');
  allChip.className='chip sel';
  allChip.style.borderColor='var(--saffron)'; allChip.style.color='var(--saffron)';
  allChip.textContent=selW.length===words.length?'✓ सभी हटाएं':'+सभी';
  allChip.onclick=()=>{selW=selW.length===words.length?[]:[...words];renderGrid();startPrac();};
  box.appendChild(allChip);
  words.forEach(w=>{
    const c=document.createElement('span');
    c.className='chip'+(selW.find(s=>s.w===w.w)?' sel':'');
    c.textContent=w.w; c.title=w.m+' — '+w.r;
    c.onclick=()=>toggleW(w);
    box.appendChild(c);
  });
  document.getElementById('poolCount').textContent=`${selW.length} / ${words.length} चुने`;
}
function toggleW(w){
  const i=selW.findIndex(s=>s.w===w.w);
  if(i>=0)selW.splice(i,1); else selW.push(w);
  renderGrid(); startPrac();
}

// ══════════════════════════════════════════════════════
// PRACTICE ENGINE
// ══════════════════════════════════════════════════════
function startPrac(){
  document.getElementById('poolCount').textContent=`${selW.length} / ${getFilteredWords().length} चुने`;
  if(!selW.length){
    document.getElementById('aEmpty').style.display='block';
    document.getElementById('aContent').style.display='none';
    document.getElementById('skipBtn').classList.remove('show');
    curObj=null; return;
  }
  document.getElementById('aEmpty').style.display='none';
  document.getElementById('aContent').style.display='block';
  document.getElementById('skipBtn').classList.add('show');
  actW=shuffle([...selW]); curIdx=0; loadWord();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function loadWord(){
  if(!actW.length)actW=shuffle([...selW]);
  curObj=actW[curIdx%actW.length]; curIdx++;
  typed=[];
  hideSt();
  document.getElementById('arena').className='arena';
  document.getElementById('aBsp').classList.remove('show');
  document.getElementById('aTyped').textContent='';
  renderWord(); updateProg();
}
function nextWord(){
  if(!curObj)return;
  document.getElementById('aContent').classList.add('pop');
  setTimeout(()=>document.getElementById('aContent').classList.remove('pop'),320);
  WD++; document.getElementById('wd').textContent=WD;
  updateAcc(); loadWord();
}

// ══════════════════════════════════════════════════════
// RENDER WORD
// ══════════════════════════════════════════════════════
function renderWord(){
  if(!curObj)return;
  const chars=[...curObj.w];
  document.getElementById('aMeaning').innerHTML=
    `<span class="a-tag">${TYPE_LABELS[curObj.type]||curObj.type}</span> ${curObj.m}`;
  document.getElementById('aWord').innerHTML=
    chars.map((c,i)=>`<span class="ch ${i===0?'cur':'pend'}">${c}</span>`).join('');
  document.getElementById('aRoman').textContent=curObj.r;
}
function refreshChars(){
  if(!curObj)return;
  const pos=typed.length;
  const chars=[...curObj.w];
  document.querySelectorAll('#aWord .ch').forEach((s,i)=>{
    s.className='ch '+(i<pos?(typed[i]==='ok'?'ok':'bad'):(i===pos?'cur':'pend'));
  });
  document.getElementById('aTyped').textContent=pos>0?`${pos}/${chars.length} अक्षर`:'';
}

// ══════════════════════════════════════════════════════
// KEY HANDLERS
// ══════════════════════════════════════════════════════
function onKD(e){
  // Always sync shiftDown from the event's shiftKey — this is the source of truth.
  // Relying only on keydown/keyup tracking breaks when the OS swallows the keyup
  // (e.g. switching keyboard layouts while Shift is held).
  const isShift = e.shiftKey;
  if(e.key==='Shift'){
    shiftDown=true; setShiftUI(true); return;
  }
  // Sync state in case a keyup was missed (layout switch, alt-tab, etc.)
  if(shiftDown!==isShift){ shiftDown=isShift; setShiftUI(isShift); }

  if(!curObj)return;
  if(e.key==='Backspace'){
    e.preventDefault();
    if(typed.length>0){
      typed.pop();refreshChars();hideSt();
      if(!typed.some(s=>s==='bad')){
        document.getElementById('arena').className='arena';
        document.getElementById('aBsp').classList.remove('show');
      }
    }
    return;
  }
  if(e.ctrlKey||e.metaKey||e.altKey||e.key.length>1)return;
  const pos=typed.length;
  const chars=[...curObj.w];
  if(pos>=chars.length)return;
  e.preventDefault();
  const expected=chars[pos];
  // Resolve the physical key code reliably:
  // e.code gives the physical key regardless of shift/layout (e.g. "Semicolon", "Quote")
  // We map e.code → base key char for our INS lookup table
  const CODE_TO_KEY = {
    'Backquote':'`','Minus':'-','Equal':'=',
    'BracketLeft':'[','BracketRight':']','Backslash':'\\',
    'Semicolon':';','Quote':"'",'Comma':',','Period':'.','Slash':'/',
  };
  // For letter/digit keys, e.code is like "KeyA" or "Digit1"
  let k;
  if(e.code && CODE_TO_KEY[e.code]!==undefined){
    k = CODE_TO_KEY[e.code];
  } else if(e.code && e.code.startsWith('Key')){
    k = e.code.slice(3).toLowerCase(); // "KeyA" → "a"
  } else if(e.code && e.code.startsWith('Digit')){
    k = e.code.slice(5); // "Digit1" → "1"
  } else {
    k = e.key.toLowerCase();
  }
  // Use e.shiftKey directly — the most reliable signal
  const pair=INS[k]||[e.key,''];
  const produced=isShift ? (pair[1]||'') : pair[0];
  if(produced===expected){
    markOk(pos,k);
  } else {
    markErr(pos,k, isShift && pair[0]===expected);
  }
}
function onKU(e){
  if(e.key==='Shift'){shiftDown=false;setShiftUI(false);}
  // Also sync on any keyup in case state drifted
  else if(shiftDown && !e.shiftKey){shiftDown=false;setShiftUI(false);}
}
function markOk(pos,k){
  typed.push('ok');SC++;document.getElementById('sc').textContent=SC;
  flashKey(k,'ok');showSt('✓ सही!','ok');
  document.getElementById('arena').className='arena ok-mode';
  refreshChars();updateAcc();
  const chars=[...curObj.w];
  if(typed.length>=chars.length&&typed.every(s=>s==='ok'))setTimeout(()=>nextWord(),420);
}
function markErr(pos,k,shiftNotNeeded){
  typed.push('bad');EC++;document.getElementById('ec').textContent=EC;
  flashKey(k,'err');
  document.getElementById('arena').className='arena err-mode';
  document.getElementById('aBsp').classList.add('show');
  if(shiftNotNeeded){
    showSt('⚠ Shift मत दबाएं!','err');
    const b=document.getElementById('shiftBan');
    b.textContent='⚠ यहाँ Shift की जरूरत नहीं — बिना Shift के दबाएं!';
    b.classList.add('show');
    if(shiftTmr)clearTimeout(shiftTmr);
    shiftTmr=setTimeout(()=>b.classList.remove('show'),2800);
  }else showSt('✗ गलत!','err');
  refreshChars();updateAcc();
}

// ══════════════════════════════════════════════════════
// SHIFT UI
// ══════════════════════════════════════════════════════
function setShiftUI(on){
  const pill=document.getElementById('shiftPill');
  const kbDiv=document.getElementById('kbDiv');
  const mode=document.getElementById('kbMode');
  if(on){
    pill.className='shift-pill on';pill.innerHTML='<span class="spill-dot"></span> Shift: ON ⇧';
    kbDiv.classList.add('kb-shift');mode.className='kb-mode shift-on';mode.textContent='⇧ Shift Mode — Shifted characters active';
  }else{
    pill.className='shift-pill';pill.innerHTML='<span class="spill-dot"></span> Shift: OFF';
    kbDiv.classList.remove('kb-shift');mode.className='kb-mode';mode.textContent='Normal Mode';
  }
}

// ══════════════════════════════════════════════════════
// KEYBOARD RENDER
// ══════════════════════════════════════════════════════
function renderKb(){
  const div=document.getElementById('kbDiv');
  div.innerHTML='';
  KB_ROWS.forEach((row,ri)=>{
    const rDiv=document.createElement('div'); rDiv.className='krow';
    row.forEach(k=>{
      const [n,s]=INS[k]||[k,''];
      const rowType=KEY_ROW[k]||'num';
      const el=document.createElement('div');
      el.className='key'+(rowType==='home'?' home-row':rowType==='top'?' top-row':rowType==='bot'?' bot-row':'');
      el.dataset.key=k;
      el.innerHTML=`<span class="ksh">${s||''}</span><span class="knm">${n||k}</span><span class="klt">${k.toUpperCase()}</span>`;
      rDiv.appendChild(el);
    });
    div.appendChild(rDiv);
  });
  // Space row
  const sr=document.createElement('div'); sr.className='krow';
  const sp=document.createElement('div'); sp.className='key space'; sp.dataset.key=' ';
  sp.innerHTML=`<span class="ksh"></span><span class="knm" style="font-family:'Syne';font-size:.6rem;color:var(--muted)">SPACE</span><span class="klt"></span>`;
  const bs=document.createElement('div'); bs.className='key wide'; bs.dataset.key='backspace';
  bs.innerHTML=`<span class="ksh"></span><span class="knm" style="font-family:'Syne';font-size:.65rem;color:var(--muted)">⌫</span><span class="klt">bksp</span>`;
  sr.appendChild(sp); sr.appendChild(bs); div.appendChild(sr);
}
function flashKey(k,type){
  document.querySelectorAll('.key').forEach(el=>{
    if(el.dataset.key===k){
      el.classList.add(type==='ok'?'flash-ok':'flash-err');
      setTimeout(()=>el.classList.remove('flash-ok','flash-err'),380);
    }
  });
}

// ══════════════════════════════════════════════════════
// STATUS / STATS
// ══════════════════════════════════════════════════════
function showSt(msg,type){
  const el=document.getElementById('aBadge');
  el.textContent=msg;el.className='a-badge '+type;
  if(stTmr)clearTimeout(stTmr);stTmr=setTimeout(()=>hideSt(),850);
}
function hideSt(){document.getElementById('aBadge').className='a-badge';}
function updateAcc(){
  const t=SC+EC;document.getElementById('accv').textContent=t===0?'—':Math.round(SC/t*100)+'%';
}
function updateProg(){
  const p=selW.length?Math.min(WD/(selW.length*2)*100,100):0;
  document.getElementById('pbarFill').style.width=p+'%';
}
function resetStats(){
  SC=0;EC=0;WD=0;
  document.getElementById('sc').textContent='0';
  document.getElementById('ec').textContent='0';
  document.getElementById('wd').textContent='0';
  document.getElementById('accv').textContent='—';
  document.getElementById('pbarFill').style.width='0%';
  if(curObj)loadWord();
}

init();
</script>
